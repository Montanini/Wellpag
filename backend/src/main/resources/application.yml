spring:
  application:
    name: wellpag

  data:
    mongodb:
      uri: ${MONGODB_URI}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, email, profile

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

wellpag:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000  # 24 horas
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  webhook:
    base-url: ${WEBHOOK_BASE_URL:http://localhost:8080}
  whatsapp:
    evolution-api-url: ${EVOLUTION_API_URL:http://localhost:8081}
    evolution-api-key: ${EVOLUTION_API_KEY:}
    scheduler-cron: ${WHATSAPP_CRON:0 0 9 * * *}   # Todo dia às 09h
  mensalidade:
    scheduler-cron: ${MENSALIDADE_CRON:0 5 0 1 * *}  # Todo dia 1º do mês às 00h05
