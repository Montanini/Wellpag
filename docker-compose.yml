version: '3.8'

# Ambiente de desenvolvimento local
# Uso: docker compose up -d

services:

  mongodb:
    image: mongo:7
    container_name: wellpag-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: wellpag-evolution
    ports:
      - "8081:8080"
    environment:
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=wellpag-local-key
      - DATABASE_ENABLED=false
      - QRCODE_LIMIT=10
    volumes:
      - evolution_data:/evolution/instances

volumes:
  mongo_data:
  evolution_data:
