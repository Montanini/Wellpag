name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
    branches:
      - main
      - develop
  pull_request:
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build e testes
        working-directory: backend
        run: mvn verify -B
        env:
          MONGODB_URI: mongodb://localhost:27017/wellpag_test
          JWT_SECRET: test-secret-minimo-256-bits-para-hmac-sha256-ok
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          GITHUB_CLIENT_ID: dummy
          GITHUB_CLIENT_SECRET: dummy
          FRONTEND_URL: http://localhost:3000
          WEBHOOK_BASE_URL: http://localhost:8080
          EVOLUTION_API_URL: http://localhost:8081
          EVOLUTION_API_KEY: dummy
